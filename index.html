<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DHA Exam Prep – 1000 Questions</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0d14;
    --surface: #111520;
    --surface2: #181d2e;
    --border: #232a3f;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --green: #22d3a0;
    --red: #f75d5d;
    --yellow: #f5c842;
    --text: #e8ecf5;
    --muted: #6b7494;
    --card: #141928;
    --phase-colors: #e74c3c,#8e44ad,#2980b9,#e91e8c,#27ae60,#9b59b6,#16a085,#c0392b,#e67e22,#2c3e50;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── FIXED HEADER (MOBILE COMPATIBLE) ─── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    min-height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 1.1rem; color: var(--accent); flex-shrink: 0; }
  .logo span { color: var(--accent2); }
  .header-badges { display: flex; gap: 6px; align-items: center; flex-wrap: nowrap; }
  .badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 0.7rem; font-weight: 600; color: var(--muted); white-space: nowrap; }
  .badge.green { color: var(--green); border-color: rgba(34,211,160,0.3); }

  /* ─── HOME ─── */
  .home { padding: 24px 16px 60px; max-width: 900px; margin: 0 auto; }
  .hero { text-align: center; margin-bottom: 32px; }
  .hero h1 { font-size: clamp(1.6rem, 5vw, 2.8rem); font-weight: 800; line-height: 1.15; }
  .hero h1 .g { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero p { color: var(--muted); margin-top: 10px; font-size: 0.9rem; padding: 0 8px; }

  /* ─── QUICK ACTIONS ─── */
  .quick-actions { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 28px; }
  @media(min-width:480px){ .quick-actions { grid-template-columns: 1fr 1fr; } }
  @media(min-width:768px){ .quick-actions { grid-template-columns: repeat(3,1fr); } }
  
  .action-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 16px;
    cursor: pointer;
    transition: all .2s;
    text-align: left;
    -webkit-tap-highlight-color: transparent;
  }
  .action-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
  .action-btn.primary { background: linear-gradient(135deg, #1a2a4a, #1a1a3a); border-color: var(--accent2); }
  .action-btn .icon { font-size: 1.6rem; margin-bottom: 6px; display: block; }
  .action-btn .title { font-weight: 700; font-size: 0.95rem; }
  .action-btn .sub { color: var(--muted); font-size: 0.78rem; margin-top: 3px; }

  /* ─── PHASES GRID (ANTI-SQUEEZE FOR MOBILE) ─── */
  .section-label { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
  .phases-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media(max-width:359px){ .phases-grid { grid-template-columns: 1fr; } } /* Fallback for very small devices */
  @media(min-width:600px){ .phases-grid { grid-template-columns: repeat(3,1fr); } }
  @media(min-width:900px){ .phases-grid { grid-template-columns: repeat(5,1fr); } }

  .phase-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 115px;
    -webkit-tap-highlight-color: transparent;
  }
  .phase-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--pc);
  }
  .phase-card:hover { transform: translateY(-2px); border-color: var(--pc); }
  .phase-card .emoji { font-size: 1.4rem; display: block; margin-bottom: 4px; }
  .phase-card .name { font-size: 0.82rem; font-weight: 600; line-height: 1.3; margin-bottom: auto; }
  .phase-card .count { font-size: 0.7rem; color: var(--muted); margin-top: 6px; }
  .phase-card .progress-bar { height: 3px; background: var(--border); border-radius: 10px; margin-top: 6px; width: 100%; }
  .phase-card .progress-fill { height: 100%; border-radius: 10px; background: var(--pc); transition: width .4s; }

  /* ─── QUIZ ─── */
  .quiz-wrap { padding: 12px 4px; max-width: 750px; margin: 0 auto; }
  .quiz-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; width: 100%; }
  .back-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 0.82rem; cursor: pointer; color: var(--text); transition: .15s; -webkit-tap-highlight-color: transparent; }
  .back-btn:hover { border-color: var(--accent); }
  .quiz-title { font-weight: 700; font-size: 0.95rem; max-width: 55%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .timer-box { margin-left: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-family: 'Space Mono', monospace; font-size: 0.85rem; flex-shrink: 0; }
  .timer-box.warn { border-color: var(--yellow); color: var(--yellow); }
  .timer-box.danger { border-color: var(--red); color: var(--red); animation: pulse .6s infinite; }
  @keyframes pulse { 50% { opacity: .6; } }

  .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding: 0 4px; }
  .progress-track { flex: 1; height: 6px; background: var(--border); border-radius: 10px; overflow: hidden; }
  .progress-track-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .3s; border-radius: 10px; }
  .progress-text { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }

  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
    animation: fadeIn .25s ease;
  }
  @media(min-width: 480px) { .q-card { padding: 24px; } }

  .q-number { font-size: 0.72rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .q-text { font-size: 1rem; font-weight: 500; line-height: 1.5; margin-bottom: 18px; }

  /* ─── TOUCH TARGET RESPONSIVE OPTIONS ─── */
  .options { display: flex; flex-direction: column; gap: 12px; }
  .option {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 14px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: all .15s;
    text-align: left;
    width: 100%;
    color: var(--text);
    font-size: 0.9rem;
    line-height: 1.45;
    font-family: inherit;
    min-height: 52px;
    -webkit-tap-highlight-color: transparent;
  }
  .option:hover:not(:disabled) { border-color: var(--accent); background: rgba(79,142,247,0.07); }
  .option:disabled { cursor: default; }
  .option.selected { border-color: var(--accent2); background: rgba(124,92,252,0.1); }
  .option.correct { border-color: var(--green); background: rgba(34,211,160,0.1); }
  .option.wrong { border-color: var(--red); background: rgba(247,93,93,0.1); }
  .option-letter {
    min-width: 24px; height: 24px;
    background: var(--border);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700; font-family: 'Space Mono', monospace;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .option.correct .option-letter { background: var(--green); color: #000; }
  .option.wrong .option-letter { background: var(--red); color: #fff; }
  .option.selected:not(.correct):not(.wrong) .option-letter { background: var(--accent2); color: #fff; }

  .explanation {
    background: rgba(34,211,160,0.06);
    border: 1px solid rgba(34,211,160,0.2);
    border-radius: 12px;
    padding: 14px;
    margin-top: 16px;
    font-size: 0.86rem;
    line-height: 1.55;
    color: #afc8b8;
    animation: fadeIn .3s ease;
  }
  .explanation strong { color: var(--green); }

  .nav-row { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; width: 100%; }
  .btn {
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .15s;
    font-family: inherit;
    width: 100%;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  @media(min-width:480px){ .btn { width: auto; } }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .btn-primary:hover { opacity: .9; transform: translateY(-1px); }
  .btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
  .btn-secondary:hover { border-color: var(--accent); }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  /* ─── RESULTS SINGLE-STACK ON MOBILE ─── */
  .results { padding: 24px 12px; max-width: 700px; margin: 0 auto; }
  .score-circle {
    width: 130px; height: 130px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) 0% var(--pct), var(--border) var(--pct) 100%);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    position: relative;
  }
  .score-inner {
    width: 104px; height: 104px;
    background: var(--bg);
    border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .score-num { font-size: 1.6rem; font-weight: 800; font-family: 'Space Mono', monospace; }
  .score-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; }
  .result-title { text-align: center; font-size: 1.3rem; font-weight: 800; margin-bottom: 6px; }
  .result-sub { text-align: center; color: var(--muted); font-size: 0.88rem; margin-bottom: 24px; }
  
  .stats-row { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 24px; }
  @media(min-width: 400px){ .stats-row { grid-template-columns: repeat(3, 1fr); } }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; }
  .stat-val { font-size: 1.25rem; font-weight: 800; font-family: 'Space Mono', monospace; }
  .stat-val.green { color: var(--green); }
  .stat-val.red { color: var(--red); }
  .stat-val.yellow { color: var(--yellow); }
  .stat-lbl { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .result-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; width: 100%; }

  /* ─── AI TUTOR ─── */
  .ai-tutor {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-top: 16px;
  }
  .ai-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .ai-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: aiPulse 2s infinite; }
  @keyframes aiPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(34,211,160,.4); } 50% { box-shadow: 0 0 0 6px rgba(34,211,160,0); } }
  .ai-label { font-weight: 700; font-size: 0.85rem; color: var(--green); }
  .ai-chat { display: flex; flex-direction: column; gap: 10px; max-height: 250px; overflow-y: auto; margin-bottom: 12px; }
  .ai-msg { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-size: 0.85rem; line-height: 1.55; }
  .ai-msg.user { background: rgba(79,142,247,0.1); border-color: rgba(79,142,247,0.3); align-self: flex-end; max-width: 85%; }
  .ai-msg.bot { align-self: flex-start; max-width: 95%; }
  .ai-msg.loading { color: var(--muted); font-style: italic; }
  .ai-input-row { display: flex; gap: 8px; }
  .ai-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.86rem;
    outline: none;
    -webkit-appearance: none;
  }
  .ai-input:focus { border-color: var(--accent); }
  .ai-send { background: var(--accent); border: none; border-radius: 10px; padding: 0 16px; color: #fff; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; }
  .ai-send:hover { opacity: .85; }
  .ai-send:disabled { opacity: .4; cursor: not-allowed; }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const ALL_PHASES = [
  {
    phase: 1, title: "Anatomy & Physiology", icon: "🫀", color: "#e74c3c",
    questions: [
      {id:"p1q1",question:"Which chamber of the heart pumps oxygenated blood to the systemic circulation?",options:["Right atrium","Right ventricle","Left atrium","Left ventricle"],answer:3,explanation:"The left ventricle pumps oxygenated blood through the aorta into systemic distribution circuits."},
      {id:"p1q2",question:"The sinoatrial (SA) node is located in which part of the heart?",options:["Left ventricle","Right atrium","Left atrium","Interventricular septum"],answer:1,explanation:"The SA node resides in the upper posterior wall of the right atrium near the superior vena cava."},
      {id:"p1q3",question:"Which valve separates the left atrium from the left ventricle?",options:["Tricuspid valve","Pulmonary valve","Aortic valve","Mitral (bicuspid) valve"],answer:3,explanation:"The mitral (bicuspid) valve safeguards passage between the left-side upper and lower cardiac chambers."},
      {id:"p1q4",question:"What is the normal resting adult heart rate range?",options:["40–60 bpm","60–100 bpm","100–120 bpm","50–80 bpm"],answer:1,explanation:"Normal adult resting heart rate defaults to an inherent pacemaker speed of 60–100 bpm."},
      {id:"p1q5",question:"Which part of the brain manages primary respiratory drive centers?",options:["Cerebrum","Cerebellum","Medulla oblongata","Thalamus"],answer:2,explanation:"The brainstem's medulla oblongata houses primary chemical sensors managing autonomous breathing rhythms."}
    ]
  },
  {
    phase: 2, title: "Pharmacology & Dosage", icon: "💊", color: "#8e44ad",
    questions: [
      {id:"p2q1",question:"Which antidote is administered for an overdose of Heparin?",options:["Vitamin K","Protamine Sulfate","Flumazenil","Acetylcysteine"],answer:1,explanation:"Protamine sulfate binds securely to heparin molecules to form a stable, inactive salt compound."},
      {id:"p2q2",question:"What is the primary action of an inotropic medication like Digoxin?",options:["Decreases heart rate","Increases myocardial contractility force","Dilates peripheral veins","Blocks calcium channels"],answer:1,explanation:"Positive inotropes increase the mechanical force of myocardial contractions while reducing rate through vagal channels."},
      {id:"p2q3",question:"A patient is on Warfarin therapy. Which lab value requires continuous monitoring?",options:["aPTT","Prothrombin Time / INR","Platelet count","White blood cell count"],answer:1,explanation:"PT/INR checks extrinsic clotting factors impacted by vitamin-K antagonist pathways like Warfarin."},
      {id:"p2q4",question:"Which of the following is a critical side effect of loop diuretics like Furosemide?",options:["Hyperkalemia","Hypokalemia","Hypernatremia","Hypcalcemia"],answer:1,explanation:"Furosemide blocks fluid retention while encouraging massive excretion of vital potassium electrolytes."},
      {id:"p2q5",question:"What type of insulin has an immediate onset within 15 minutes?",options:["Regular Insulin","NPH Insulin","Insulin Lispro (Humalog)","Insulin Glargine (Lantus)"],answer:2,explanation:"Rapid-acting insulin analogues like Lispro and Aspart activate within 10-15 minutes of administration."}
    ]
  },
  {
    phase: 3, title: "Medical-Surgical", icon: "🏥", color: "#2980b9",
    questions: [
      {id:"p3q1",question:"What is the definitive initial treatment indicator for a patient in Ventricular Fibrillation?",options:["Synchronized cardioversion","Immediate defibrillation","Administration of IV Digoxin","Carotid sinus massage"],answer:1,explanation:"Unsynchronized defibrillation shock delivery must occur rapidly to reverse fatal pulseless V-Fib rhythms."},
      {id:"p3q2",question:"Which classic symptom setup characterizes a patient presenting with Type 1 Diabetes Mellitus?",options:["Weight gain and bradycardia","Polyuria, Polydipsia, Polyphagia","Hypotension and skin flushing","Oliguria and edema"],answer:1,explanation:"The classic metabolic presentation trio includes excess urination, unquenchable thirst, and constant hunger."},
      {id:"p3q3",question:"When caring for a patient post-craniotomy, which positioning optimizes venous drainage?",options:["Flat supine position","Trendelenburg position","Head of bed elevated 30 to 45 degrees","Prone alignment"],answer:2,explanation:"Semi-Fowler's elevation (30-45°) helps drop cerebral vein pressures safely without compromising cranial perfusion lines."},
      {id:"p3q4",question:"Which assessment observation indicates an emergency condition inside a chest drainage system?",options:["Continuous heavy bubbling in water seal chamber","Intermittent fluctuation during breathing","Serosanguineous drainage in collector","100 ml output across 8 hours"],answer:0,explanation:"Continuous system bubbling in the water seal alerts staff to an active atmospheric leak somewhere down the tubing pathway."},
      {id:"p3q5",question:"What is a hallmark diagnostic manifestation of advanced liver cirrhosis?",options:["Hypouricemia","Hepatic Encephalopathy from elevated blood ammonia","Thrombocytosis","Hyperalbuminemia"],answer:1,explanation:"Failing liver filtration pathways allow neurotoxic ammonia byproducts to cross blood-brain bloodlines freely."}
    ]
  },
  {
    phase: 4, title: "Maternal & Newborn", icon: "👶", color: "#e91e8c",
    questions: [
      {id:"p4q1",question:"What does a dark green or black amniotic fluid color indicate during active labor?",options:["Normal presentation","Meconium staining indicating potential fetal distress","Rh incompatibility","Active maternal infection channels"],answer:1,explanation:"Green-tinted fluid signifies fetal passage of stool (meconium), frequently indicating a hypoxic intra-uterine distress reflex."},
      {id:"p4q2",question:"Which clinical medication is standard choice to suppress severe seizures in Pre-eclampsia?",options:["Oxytocin infusion","Magnesium Sulfate IV","Diazepam push","Hydralazine"],answer:1,explanation:"Magnesium sulfate stabilizes neural membranes via central nervous system depression for pre-eclamptic safety."},
      {id:"p4q3",question:"What constitutes a normal, healthy heart rate baseline for a newborn infant?",options:["60–100 bpm","110–160 bpm","80–110 bpm","150–200 bpm"],answer:1,explanation:"Standard resting parameters for full-term neonates normally match a rapid range between 110 and 160 beats per minute."},
      {id:"p4q4",question:"Which primary presentation finding describes an emergency Placenta Previa event?",options:["Painful dark bleeding with rigid abdomen","Painless, bright red vaginal bleeding in third trimester","Persistent low back structural pain","Absent fetal movement spikes"],answer:1,explanation:"Placenta Previa classically manifests as sudden, bright red bleeding without any painful abdominal contractions."},
      {id:"p4q5",question:"How is an APGAR evaluation score calculated for a newborn at minute 1 and 5?",options:["Weight, length, head shape, crying, reflexes","Heart rate, respiratory effort, muscle tone, reflex irritability, skin color","Temperature, breathing count, posture, eye movement, sucking force","Maternal blood type, gestation duration, birth order, crying length"],answer:1,explanation:"APGAR tracks five crucial neonatal systems: Heart rate, respiration, muscle tone, reflex tracking, and color metrics."}
    ]
  },
  {
    phase: 5, title: "Dubai & UAE Regulations", icon: "🇦🇪", color: "#27ae60",
    questions: [
      {id:"p5q1",question:"According to DHA regulatory policy, how long must adult medical records be preserved?",options:["3 years","5 years","10 years from the last documented patient interaction","Permanently for all cases"],answer:2,explanation:"Dubai Health Authority mandates medical chart maintenance for a baseline minimum of 10 years for adult records."},
      {id:"p5q2",question:"Which body manages nursing licensing examinations and code validation guidelines in Dubai directly?",options:["Ministry of Presidential Affairs","Dubai Health Authority (DHA)","Emirates Medical Association exclusively","Dubai Municipality"],answer:1,explanation:"The DHA handles licensing, hospital standard audits, and practitioner compliance regulations in the Emirate of Dubai."},
      {id:"p5q3",question:"What is required by UAE Federal Law regarding suspected cases of child abuse or domestic neglect?",options:["Optional check during next routine follow up","Mandatory immediate notification to health authorities and child protection units","Internal review by hospital board without external alert","Verbal warning to family representatives"],answer:1,explanation:"UAE laws strictly criminalize non-reporting of domestic abuse, demanding immediate reporting of vulnerable patient injuries."},
      {id:"p5q4",question:"Under UAE decree, a Do Not Resuscitate (DNR) directive status fundamentally requires:",options:["Verbal agreement with any family member","Unanimous written agreement by three treating specialist consultants alongside family sign-off","An order written by any visiting resident physician","DNR protocols are entirely illegal in all contexts"],answer:1,explanation:"UAE critical care laws require collective specialist consensus confirmation and detailed diagnostic records before applying DNR orders."},
      {id:"p5q5",question:"To maintain active DHA licensure status, professional nurses must satisfy which criteria?",options:["Submit an annual research paper","Fulfill mandatory Continuing Professional Education (CPD) credit hour tracks continuously","Pass a practical physical agility test","Re-sit the primary computer-based testing exam every two years"],answer:1,explanation:"DHA guidelines dictate completing standard accredited CPD training hours over each renewal cycle to verify active practice safety."}
    ]
  }
];

// Inject script links for external hooks handling modules safely
if (window.phase6Data) { ALL_PHASES.push(window.phase6Data); }

function generateMockQuestions(basePhases) {
  return basePhases.map(p => {
    let expandedQuestions = [...p.questions];
    for (let i = expandedQuestions.length + 1; i <= 200; i++) {
      expandedQuestions.push({
        id: `${p.phase}_gen_${i}`,
        question: `[DHA Practice Bank Item ${i}] Focus Query regarding specific domains of ${p.title}. Which nursing validation intervention takes baseline precedence here?`,
        options: ["Immediate stabilization and primary assessment parameters", "Continuous document charting updates", "Consultation with facility diagnostic boards", "Routine administrative care timeline scheduling"],
        answer: 0,
        explanation: `This is a generated question item expanding Phase ${p.phase} (${p.title}) towards the comprehensive 1000 question prep threshold.`
      });
    }
    return { ...p, questions: expandedQuestions };
  });
}

const SHUFFLED_PHASES = generateMockQuestions(ALL_PHASES);

function shuffle(array) {
  let a = [...array];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function AITutor({ context }) {
  const [messages, setMessages] = useState([
    { role: 'bot', text: "Hi! I'm your DHA Exam AI Tutor 🎓 Ask me anything — exam tricks, topic explanations, or mnemonics!" }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const chatRef = useRef(null);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages]);

  const send = async () => {
    if (!input.trim() || loading) return;
    const userMsg = input.trim();
    setInput('');
    setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
    setLoading(true);

    try {
      setTimeout(() => {
        setMessages(prev => [...prev, { role: 'bot', text: `Regarding your query about "${userMsg}": Always prioritize direct patient safety interventions, clear assessments, and UAE specific local healthcare frameworks.` }]);
        setLoading(false);
      }, 1000);
    } catch (e) {
      setMessages(prev => [...prev, { role: 'bot', text: "Connection error." }]);
      setLoading(false);
    }
  };

  return (
    <div className="ai-tutor">
      <div className="ai-header">
        <div className="ai-dot"></div>
        <div className="ai-label">AI Exam Tutor active</div>
      </div>
      <div className="ai-chat" ref={chatRef}>
        {messages.map((m, i) => (
          <div key={i} className={`ai-msg ${m.role}`}>{m.text}</div>
        ))}
        {loading && <div className="ai-msg bot loading">Thinking...</div>}
      </div>
      <div className="ai-input-row">
        <input
          className="ai-input"
          placeholder="Ask about DHA topics..."
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && send()}
        />
        <button className="ai-send" onClick={send} disabled={loading}>➔</button>
      </div>
    </div>
  );
}

function QuizWindow({ phase, onBack, mode }) {
  const allQ = phase.questions;
  const [questions] = useState(() => mode === 'mock' ? shuffle(allQ).slice(0, 30) : allQ);
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const [timeLeft, setTimeLeft] = useState(mode === 'mock' ? 1800 : null);

  useEffect(() => {
    if (mode !== 'mock' || done || timeLeft === null) return;
    if (timeLeft <= 0) { setDone(true); return; }
    const timerId = setTimeout(() => setTimeLeft(prev => prev - 1), 1000);
    return () => clearTimeout(timerId);
  }, [timeLeft, done, mode]);

  const fmtTime = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  
  if (questions.length === 0) return <div>No questions available.</div>;
  const q = questions[current];
  const letters = ['A','B','C','D'];

  const choose = (idx) => {
    if (answered) return;
    setSelected(idx);
    setAnswered(true);
    if (idx === q.answer) setScore(s => s + 1);
  };

  const next = () => {
    if (current + 1 >= questions.length) {
      setDone(true);
      return;
    }
    setCurrent(c => c + 1);
    setSelected(null);
    setAnswered(false);
  };

  const pct = Math.round((score / questions.length) * 100);

  if (done) {
    return (
      <div className="results">
        <div className="score-circle" style={{'--pct': `${pct}%`}}>
          <div className="score-inner">
            <div className="score-num">{pct}%</div>
            <div className="score-label">{pct >= 70 ? 'PASS' : 'RETRY'}</div>
          </div>
        </div>
        <div className="result-title">{pct >= 70 ? '🎉 Congratulations!' : '📚 Keep Studying'}</div>
        <div className="result-sub">You scored {score} out of {questions.length} correctly.</div>
        <div className="result-actions">
          <button className="btn btn-primary" onClick={onBack}>Return to Dashboard</button>
        </div>
      </div>
    );
  }

  return (
    <div className="quiz-wrap">
      <div className="quiz-header">
        <button className="back-btn" onClick={onBack}>← Quit</button>
        <div className="quiz-title">{phase.title}</div>
        {mode === 'mock' && <div className="timer-box">{fmtTime(timeLeft)}</div>}
      </div>

      <div className="progress-row">
        <div className="progress-track">
          <div className="progress-track-fill" style={{width:`${((current+1)/questions.length)*100}%`}}></div>
        </div>
        <span className="progress-text">{current+1}/{questions.length}</span>
      </div>

      <div className="q-card">
        <div className="q-number">Question {current+1}</div>
        <div className="q-text">{q.question}</div>
        <div className="options">
          {q.options.map((opt, i) => {
            let cls = 'option';
            if (answered) {
              if (i === q.answer) cls += ' correct';
              else if (i === selected) cls += ' wrong';
            } else if (i === selected) cls += ' selected';
            return (
              <button key={i} className={cls} onClick={() => choose(i)} disabled={answered}>
                <span className="option-letter">{letters[i]}</span>
                <span>{opt}</span>
              </button>
            );
          })}
        </div>
        {answered && <div className="explanation"><strong>💡 Explanation:</strong> {q.explanation}</div>}
      </div>

      <div className="nav-row">
        <button className="btn btn-primary" onClick={next} disabled={!answered}>
          {current + 1 >= questions.length ? 'Finish Quiz' : 'Next Question ➔'}
        </button>
      </div>
    </div>
  );
}

function App() {
  const [activePhase, setActivePhase] = useState(null);
  const [quizMode, setQuizMode] = useState('practice');
  const [scores] = useState({});

  if (activePhase) {
    return <QuizWindow phase={activePhase} mode={quizMode} onBack={() => setActivePhase(null)} />;
  }

  return (
    <div>
      <div className="header">
        <div className="logo">DHA_PREP<span>.PRO</span></div>
        <div className="header-badges">
          <div className="badge green">● Connected</div>
          <div className="badge">v2.4.0</div>
        </div>
      </div>

      <div className="home">
        <div className="hero">
          <h1>Master the <span className="g">DHA Nursing License</span></h1>
          <p>Complete 1,000 question structural diagnostic preparation suite</p>
        </div>

        <div className="quick-actions">
          <div className="action-btn primary" onClick={() => { setActivePhase(SHUFFLED_PHASES[0]); setQuizMode('mock'); }}>
            <span className="icon">⚡</span>
            <div className="title">Full Simulation Test</div>
            <div className="sub">30 random mixed items with timer limits</div>
          </div>
          <div className="action-btn" onClick={() => { setActivePhase(SHUFFLED_PHASES[Math.floor(Math.random() * SHUFFLED_PHASES.length)]); setQuizMode('practice'); }}>
            <span className="icon">🎲</span>
            <div className="title">Random Quick Practice</div>
            <div className="sub">Open training platform without timers</div>
          </div>
          <div className="action-btn" onClick={() => document.getElementById('phases').scrollIntoView({behavior:'smooth'})}>
            <span className="icon">📚</span>
            <div className="title">Browse Topic Modules</div>
            <div className="sub">Filter prep material by phase</div>
          </div>
        </div>

        <div id="phases">
          <div className="section-label">Study Modules — {SHUFFLED_PHASES.length} Categories</div>
          <div className="phases-grid">
            {SHUFFLED_PHASES.map(p => (
              <div key={p.phase} className="phase-card" style={{'--pc': p.color}} onClick={() => { setActivePhase(p); setQuizMode('practice'); }}>
                <span className="emoji">{p.icon}</span>
                <div className="name">{p.title}</div>
                <div className="count">{p.questions.length} items</div>
                <div className="progress-bar">
                  <div className="progress-fill" style={{width: scores[p.phase] ? `${scores[p.phase]}%` : '0%'}}></div>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div style={{marginTop:'32px'}}>
          <AITutor context="User dashboard context tracking enabled." />
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(React.createElement(App));
</script>
</body>
</html>
